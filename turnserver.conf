# Coturn TURN server configuration
#
# IMPORTANT: `static-auth-secret` below is a PLACEHOLDER. Generate a
# production value with `openssl rand -hex 32` and keep it identical
# in the API server's `ROOMLER__TURN__SHARED_SECRET` env var — the
# server signs ephemeral TURN credentials with this secret and coturn
# verifies them, so a mismatch breaks all TURN auth. For local dev
# you can set both to the same arbitrary string.
listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
static-auth-secret=CHANGE-ME-openssl-rand-hex-32
realm=roomler-ai.local
log-file=/var/log/turnserver.log
simple-log
