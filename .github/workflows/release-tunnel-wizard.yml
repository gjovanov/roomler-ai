name: Release roomler-tunnel-installer

# Builds the `roomler-tunnel-installer` Tauri 2 wizard EXE for the
# three desktop targets the operator might run on:
#   - Linux x86_64 (gtk + webkit2gtk) — packaged as `.tar.gz`
#   - macOS universal (x86_64 + aarch64 lipo'd) — packaged as `.tar.gz`
#   - Windows x86_64 (msvc + webview2 runtime auto-bootstrap) — `.zip`
#
# The wizard release tag is INDEPENDENT of the CLI tag (`tunnel-v*`)
# so the two can iterate without forcing each other to re-release.
#
# Tag schema: `tunnel-wizard-v<workspace_version>`. Workspace version
# in Cargo.toml is the source of truth (matches the agent installer's
# convention from rc.28). The wizard's `tauri.conf.json` version may
# lag for UI display but the Cargo crate version (which inherits via
# `version.workspace = true`) drives the released artifact naming.
#
# Triggered by:
#  - `git push` of a tag matching `tunnel-wizard-v*` → publishes a
#    GitHub Release. The api's `/api/tunnel-wizard/<platform>` proxy
#    serves the published assets via its 1h cache.
#  - `workflow_dispatch` with `version` + `publish_release` → artifacts
#    only (30-day retention) unless `publish_release=true`.
#
# Code signing (Authenticode on Win / notarisation on macOS) is
# DEFERRED — v1 wizard EXEs are unsigned. SmartScreen + Gatekeeper
# will warn on first run; docs/tunnel-install.md will surface the
# workaround. Signing tracked alongside the agent installer's
# signing work (rc.28's Authenticode TODO).

on:
  push:
    tags:
      - 'tunnel-wizard-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Wizard version (e.g. 0.3.0-rc.1) — must match workspace Cargo.toml'
        required: true
      publish_release:
        description: 'Create a GitHub Release with the artifacts'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 0. Validate version matches Cargo.toml
  # ---------------------------------------------------------------------------
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version + tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#tunnel-wizard-v}"
            is_release=true
          else
            version="${{ github.event.inputs.version }}"
            tag="tunnel-wizard-v${version}"
            if [[ "${{ github.event.inputs.publish_release }}" == "true" ]]; then
              is_release=true
            else
              is_release=false
            fi
          fi
          echo "Resolved: version=${version} tag=${tag} is_release=${is_release}"
          cargo_version=$(awk '
            /^\[workspace\.package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && /^version[[:space:]]*=/ {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)
          echo "Cargo.toml workspace version: ${cargo_version}"
          if [[ "${cargo_version}" != "${version}" ]]; then
            echo "::error::Version mismatch: requested ${version} but Cargo.toml has ${cargo_version}"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 1. Linux x86_64 — Tauri webkit2gtk needs apt-installed deps
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build wizard (Linux x86_64)
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
      - name: Cache cargo
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: tunnel-wizard-linux
      - name: Install Tauri Linux system deps
        # webkit2gtk + libsoup + ayatana for tray (tray is unused here
        # but the Tauri Linux runtime links to it; matches agent
        # installer's release-agent.yml). librsvg2 is for icon decode.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf
      - name: Build wizard (release)
        run: cargo build -p roomler-tunnel-installer --release
      - name: Strip binary
        run: strip target/release/roomler-tunnel-installer
      - name: Pack tarball
        id: tar
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          name="roomler-tunnel-installer-${version}-x86_64-unknown-linux-gnu"
          mkdir -p "/tmp/${name}"
          cp target/release/roomler-tunnel-installer "/tmp/${name}/"
          cp LICENSE README.md "/tmp/${name}/" 2>/dev/null || true
          (cd /tmp && tar czf "${name}.tar.gz" "${name}")
          sha256sum "/tmp/${name}.tar.gz" | awk '{print $1"  "$2}' > "/tmp/${name}.tar.gz.sha256"
          mv "/tmp/${name}.tar.gz" "/tmp/${name}.tar.gz.sha256" .
          echo "artifact=${name}.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Upload Linux wizard artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizard-linux-x86_64
          path: |
            ${{ steps.tar.outputs.artifact }}
            ${{ steps.tar.outputs.artifact }}.sha256
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 2. macOS — universal binary (x86_64 + aarch64 lipo'd) + tarball
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build wizard (macOS universal)
    needs: validate-version
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Cache cargo
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: tunnel-wizard-macos
      - name: Build wizard x86_64
        run: cargo build -p roomler-tunnel-installer --release --target x86_64-apple-darwin
      - name: Build wizard aarch64
        run: cargo build -p roomler-tunnel-installer --release --target aarch64-apple-darwin
      - name: Lipo into universal
        run: |
          mkdir -p target/release-universal
          lipo -create -output target/release-universal/roomler-tunnel-installer \
            target/x86_64-apple-darwin/release/roomler-tunnel-installer \
            target/aarch64-apple-darwin/release/roomler-tunnel-installer
          strip target/release-universal/roomler-tunnel-installer
          file target/release-universal/roomler-tunnel-installer
      - name: Pack tarball
        id: tar
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          name="roomler-tunnel-installer-${version}-universal-apple-darwin"
          mkdir -p "/tmp/${name}"
          cp target/release-universal/roomler-tunnel-installer "/tmp/${name}/"
          cp LICENSE README.md "/tmp/${name}/" 2>/dev/null || true
          (cd /tmp && tar czf "${name}.tar.gz" "${name}")
          shasum -a 256 "/tmp/${name}.tar.gz" | awk '{print $1"  "$2}' > "/tmp/${name}.tar.gz.sha256"
          mv "/tmp/${name}.tar.gz" "/tmp/${name}.tar.gz.sha256" .
          echo "artifact=${name}.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Upload macOS wizard artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizard-macos-universal
          path: |
            ${{ steps.tar.outputs.artifact }}
            ${{ steps.tar.outputs.artifact }}.sha256
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. Windows x86_64 — zip with roomler-tunnel-installer.exe
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build wizard (Windows x86_64)
    needs: validate-version
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
      - name: Cache cargo
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: tunnel-wizard-windows
      - name: Build wizard (release)
        shell: pwsh
        run: cargo build -p roomler-tunnel-installer --release
      - name: Pack zip
        id: zip
        shell: pwsh
        run: |
          $version = "${{ needs.validate-version.outputs.version }}"
          $name = "roomler-tunnel-installer-$version-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\$name" -Force | Out-Null
          Copy-Item target\release\roomler-tunnel-installer.exe "$env:RUNNER_TEMP\$name\"
          if (Test-Path LICENSE) { Copy-Item LICENSE "$env:RUNNER_TEMP\$name\" }
          if (Test-Path README.md) { Copy-Item README.md "$env:RUNNER_TEMP\$name\" }
          Compress-Archive -Path "$env:RUNNER_TEMP\$name\*" -DestinationPath "$name.zip"
          $hash = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File "$name.zip.sha256" -Encoding ascii
          "artifact=$name.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Upload Windows wizard artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizard-windows-x86_64
          path: |
            ${{ steps.zip.outputs.artifact }}
            ${{ steps.zip.outputs.artifact }}.sha256
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 4. Publish GitHub Release
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: [validate-version, build-linux, build-macos, build-windows]
    if: needs.validate-version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten + list
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release/
      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.tag }}
          name: roomler-tunnel-installer ${{ needs.validate-version.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.validate-version.outputs.version, 'rc.') || contains(needs.validate-version.outputs.version, 'alpha') || contains(needs.validate-version.outputs.version, 'beta') }}
          body: |
            Automated build of `roomler-tunnel-installer` ${{ needs.validate-version.outputs.version }} via
            [release-tunnel-wizard.yml](.github/workflows/release-tunnel-wizard.yml).

            **Install / download:**
            - Linux x86_64: `.tar.gz` — extract, run `./roomler-tunnel-installer`
            - macOS universal (x86_64 + aarch64): `.tar.gz` — extract, run
              `./roomler-tunnel-installer` (Gatekeeper may require
              `xattr -d com.apple.quarantine ./roomler-tunnel-installer`
              on first launch — see docs/tunnel-install.md)
            - Windows x86_64: `.zip` containing `roomler-tunnel-installer.exe`
              — extract + double-click. SmartScreen may warn (unsigned in v1);
              click "More info → Run anyway".

            **What the wizard does:**
            1. Detects existing tunnel-client install.
            2. Walks the operator through server URL + device name + paste enrollment token.
            3. Downloads the matching `roomler-tunnel` CLI from `roomler.ai/api/tunnel/installer/<platform>`.
            4. Extracts + integrates (adds to PATH on Windows; symlinks into `~/.local/bin` on Linux/macOS).
            5. Enrolls via `POST /api/tunnel-client/enroll`.

            **First-use** is `roomler-tunnel forward --agent <hex> --local <port> --remote <host:port>`.
          files: release/*
