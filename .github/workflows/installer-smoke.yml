# Phase 6 Chunk 6A — install + uninstall smoke for the per-User MSI
# on windows-latest. Catches the regressions install_detect locks
# (UpgradeCode registry presence) + the WiX bundle's basic
# correctness (the MSI installs cleanly + the agent binary lands at
# the expected path + uninstall cleans up). Cheap signal (~10 min) on
# every push that touches the agent or installer source.
#
# Explicitly NOT in scope this iteration:
#   * WebView2 UI automation of the wizard EXE (Welcome → Server →
#     Token → Install → Done). Tauri 2 + tauri-driver on a headless
#     GitHub runner is a 1–2 day spike in itself; deferred to Chunk
#     6B once this baseline is green.
#   * SystemContext swap testing. `ROOMLER_AGENT_ENABLE_SYSTEM_SWAP=1`
#     + WTSQueryUserToken + winlogon-token spawn needs an interactive
#     desktop session that GitHub-hosted Windows runners don't expose;
#     requires a self-hosted runner on a real Win11 VM. Phase 6 plan
#     called this risk out — see commit message.
#   * Per-Machine MSI. Same install/uninstall flow but admin-elevated.
#     Add when this per-User flow is green + we want to widen coverage.
#   * Code signing. Skipped because the smoke doesn't ship anywhere.
name: installer-smoke

on:
  push:
    branches: [master]
    paths:
      - 'agents/roomler-agent/**'
      - '.github/workflows/installer-smoke.yml'
  workflow_dispatch: {}

jobs:
  windows-msi-install-uninstall:
    name: per-User MSI install + uninstall (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: installer-smoke-windows

      - name: Install WiX Toolset v3 + cargo-wix
        shell: pwsh
        run: |
          choco install -y wixtoolset
          $wixBin = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset v*\bin' | Select-Object -First 1
          "$($wixBin.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Append
          cargo install cargo-wix --locked

      - name: Build agent (release, minimal feature set)
        # Chunk 6A scope: install/uninstall validation only. Drop
        # `vp9-444` (avoids the vcpkg/libvpx dance) and `wgc-capture`
        # (Windows.Graphics.Capture not needed for install
        # validation). The MSI bundle just packages whatever exe is
        # at target/release/roomler-agent.exe; feature set affects
        # runtime behaviour only.
        shell: pwsh
        run: |
          cargo build -p roomler-agent --release `
            --features "mf-encoder,scrap-capture,openh264-encoder,enigo-input,clipboard,viewer-indicator,system-context"

      - name: Build tunnel CLI (roomler.exe) for the MSI bundle (P4b)
        shell: pwsh
        run: |
          # P4b: wix/main.wxs UNCONDITIONALLY bundles a `TunnelExe`
          # component from target\release\roomler.exe (the MSI carries
          # the tunnel CLI — node-stack unification Option A), so the
          # WiX `light` step needs the EXE present or it fails with
          # LGHT0103, same failure mode as the wintun.dll staging
          # below. Mirrors release-agent.yml's tunnel build step.
          cargo build -p roomler-tunnel --release
          if (-not (Test-Path target\release\roomler.exe)) {
            Write-Host "::error::roomler.exe not produced — TunnelExe harvest would fail (LGHT0103)"
            exit 1
          }
          Write-Host "Staged roomler.exe ($([math]::Round((Get-Item target\release\roomler.exe).Length/1MB,1)) MB) for the TunnelExe component"

      - name: Stage wintun.dll for the MSI bundle
        shell: pwsh
        run: |
          # wix/main.wxs UNCONDITIONALLY bundles a `WintunDll` component
          # (overlay-l3's TUN driver) from target\release\wintun.dll, so the
          # WiX `light` step needs the DLL present even in this minimal-feature
          # smoke build — otherwise it fails with LGHT0103 (the long-standing
          # installer-smoke red). Mirrors release-agent.yml's staging step.
          $ver = '0.14.1'
          $zip = "$env:RUNNER_TEMP\wintun.zip"
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-$ver.zip" -OutFile $zip -UseBasicParsing
          $dest = "$env:RUNNER_TEMP\wintun"
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $dll = Join-Path $dest 'wintun\bin\amd64\wintun.dll'
          if (-not (Test-Path $dll)) { Write-Host "::error::wintun.dll (amd64) not found in the downloaded archive"; exit 1 }
          Copy-Item $dll target\release\wintun.dll -Force
          Write-Host "Staged wintun.dll ($([math]::Round((Get-Item target\release\wintun.dll).Length/1KB,0)) KB) for the MSI bundle"

      - name: Build per-User MSI
        shell: pwsh
        env:
          # cargo-wix reads the version from Cargo.toml but
          # `--install-version` lets us pin a known-marker version
          # for the registry assertion (the MSI's ProductVersion
          # lands under the UpgradeCode key alongside the
          # InstallProperties).
          #
          # cargo-wix requires the prerelease component to be
          # parseable as an integer — `0.0.0-smoke` fails with
          # "we couldn't convert the prerelease components to an
          # integer" (it maps semver `X.Y.Z-<text>.<N>` to MSI
          # `X.Y.Z.N`). Use a trailing `.1` so it lands as MSI
          # `0.0.0.1` — distinct enough from any real release
          # (which always start at 0.3.0+ rc.N) that an operator
          # who finds it on a machine knows it's a smoke artifact.
          SMOKE_VERSION: 0.0.0-smoke.1
        run: |
          cargo wix -p roomler-agent --nocapture --no-build --install-version $env:SMOKE_VERSION
          $msi = Get-ChildItem 'target/wix/*.msi' | Select-Object -First 1
          if (-not $msi) { throw 'MSI not produced by cargo-wix' }
          'MSI_PATH=' + $msi.FullName | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "MSI ready: $($msi.FullName) ($([math]::Round($msi.Length / 1MB, 2)) MiB)"

      - name: Install the MSI (quiet, per-User)
        shell: pwsh
        run: |
          # /quiet runs without UI; /norestart prevents implicit reboot
          # if the MSI calls for one; /l*v emits a verbose log so the
          # workflow's artifact upload below captures it on failure.
          $logDir = Join-Path $env:RUNNER_TEMP 'msi-logs'
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          $log = Join-Path $logDir 'install.log'
          $proc = Start-Process -FilePath 'msiexec.exe' `
            -ArgumentList "/i `"$env:MSI_PATH`" /quiet /norestart /l*v `"$log`"" `
            -Wait -PassThru
          'INSTALL_LOG=' + $log | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 200
            throw "msiexec /i failed with exit $($proc.ExitCode)"
          }
          Write-Host "Install succeeded (exit 0)"

      - name: Assert registry UpgradeCode present (rc.27 install_detect lock)
        shell: pwsh
        run: |
          # rc.27's `install_detect::detect_existing_install` reads
          # HKCU + HKLM `Software\\…\\Installer\\UpgradeCodes\\<packed>`
          # where <packed> is the Windows-Installer-compressed encoding
          # of the UpgradeCode GUID. The MSI we just built carries
          # UpgradeCode `1F2D7B1C-8B2F-4D2E-B1A3-6B1E2C7E4D91` (see
          # `agents/roomler-agent/Cargo.toml::package.metadata.wix`).
          #
          # First attempt used `Get-Package -Provider msi` but the
          # PackageManagement `msi` provider isn't available on
          # PowerShell 7 (the runner's pwsh.exe), only on Windows
          # PowerShell 5.x. Run #26376742677 hit `Unable to find
          # package providers (msi)`. Switch to a direct registry walk
          # against `Uninstall\*` — works on every PS version, is
          # faster than Get-Package, and observably equivalent (an
          # MSI install lands BOTH an Uninstall entry AND the
          # UpgradeCodes entry; checking the former is sufficient
          # for "the MSI installed and the system sees it").
          $uninstallRoots = @(
            'HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall'
          )
          # Filter is intentionally loose: WiX's main.wxs uses the
          # human-readable Product Name `"Roomler Agent"` (space-
          # separated, capitalised) for DisplayName, NOT the Cargo
          # kebab-case `roomler-agent`. Match either via case-
          # insensitive regex against "roomler" + "agent". Run
          # #26377062833 diag confirmed: the installed entry reads
          # `DisplayName = "Roomler Agent"`.
          $found = $null
          foreach ($root in $uninstallRoots) {
            if (-not (Test-Path $root)) { continue }
            $found = Get-ChildItem $root -ErrorAction SilentlyContinue |
                       Get-ItemProperty -ErrorAction SilentlyContinue |
                       Where-Object {
                         $_.DisplayName -and $_.DisplayName -match '(?i)roomler.*agent'
                       } |
                       Select-Object -First 1
            if ($found) {
              Write-Host "Found install record under $root"
              break
            }
          }
          if (-not $found) {
            Write-Host '--- Roomler entries in any Uninstall hive ---'
            foreach ($root in $uninstallRoots) {
              if (-not (Test-Path $root)) { continue }
              Get-ChildItem $root -ErrorAction SilentlyContinue |
                Get-ItemProperty -ErrorAction SilentlyContinue |
                Where-Object { $_.DisplayName -like '*roomler*' } |
                Select-Object DisplayName, DisplayVersion, UninstallString |
                Format-Table -AutoSize
            }
            throw 'roomler-agent install record not found in any Uninstall registry hive'
          }
          Write-Host "Installed: $($found.DisplayName) $($found.DisplayVersion)"
          'INSTALLED_PRODUCT_CODE=' + $found.PSChildName | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Assert install payload at the canonical path (P4b)
        shell: pwsh
        run: |
          # P4b renamed the per-User install dir to
          # %LOCALAPPDATA%\Programs\Roomler and added the tunnel CLI
          # to the bundle. Assert the EXACT canonical layout (the old
          # loose multi-candidate probe would silently pass on a
          # regression back to the pre-rename dir): daemon
          # + tunnel CLI + wintun must all land. Also assert the
          # TunnelExe component's user-PATH append took (HKCU\
          # Environment — MSI writes it for Environment System='no').
          # P3d Slice C: the roomler-agent.exe alias is retired — the MSI
          # ships only the canonical names now.
          $installDir = Join-Path $env:LOCALAPPDATA 'Programs\Roomler'
          $mustExist = @('roomlerd.exe', 'roomler.exe', 'wintun.dll')
          $missing = @()
          foreach ($f in $mustExist) {
            $p = Join-Path $installDir $f
            if (Test-Path $p) {
              Write-Host "present: $p"
            } else {
              $missing += $p
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host '--- Searching for stray payloads under common roots ---'
            $roots = @(
              $env:LOCALAPPDATA,
              $env:ProgramFiles
            ) | Where-Object { Test-Path $_ }
            foreach ($r in $roots) {
              Get-ChildItem -Path $r -Include 'roomlerd.exe','roomler-agent.exe' -Recurse -ErrorAction SilentlyContinue |
                ForEach-Object { Write-Host "  found at: $($_.FullName)" }
            }
            throw "missing from $($installDir): $($missing -join ', ')"
          }
          $userPath = (Get-ItemProperty -Path 'HKCU:\Environment' -ErrorAction SilentlyContinue).PATH
          if (-not ($userPath -and $userPath -match [regex]::Escape('Programs\Roomler'))) {
            throw "user PATH does not contain Programs\Roomler after install (HKCU\Environment PATH = '$userPath')"
          }
          Write-Host "User PATH contains the install dir"

      - name: Uninstall the MSI (quiet)
        shell: pwsh
        run: |
          $logDir = Join-Path $env:RUNNER_TEMP 'msi-logs'
          $log = Join-Path $logDir 'uninstall.log'
          $proc = Start-Process -FilePath 'msiexec.exe' `
            -ArgumentList "/x `"$env:MSI_PATH`" /quiet /norestart /l*v `"$log`"" `
            -Wait -PassThru
          'UNINSTALL_LOG=' + $log | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($proc.ExitCode -ne 0) {
            Get-Content $log -Tail 200
            throw "msiexec /x failed with exit $($proc.ExitCode)"
          }
          Write-Host 'Uninstall succeeded (exit 0)'

      - name: Assert cleanup — registry + install dir gone
        shell: pwsh
        run: |
          # Same registry-direct query as the post-install assert.
          # Get-Package -Provider msi is PowerShell 5.x-only and the
          # runner uses pwsh 7 (see post-install step's comment).
          $uninstallRoots = @(
            'HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall'
          )
          # Same loose filter as the post-install step — match either
          # "Roomler Agent" (WiX DisplayName) or "roomler-agent"
          # (Cargo package name) so a future WiX rename in either
          # direction doesn't silently turn this assert into a no-op.
          $stragglers = @()
          foreach ($root in $uninstallRoots) {
            if (-not (Test-Path $root)) { continue }
            $stragglers += Get-ChildItem $root -ErrorAction SilentlyContinue |
                             Get-ItemProperty -ErrorAction SilentlyContinue |
                             Where-Object {
                               $_.DisplayName -and $_.DisplayName -match '(?i)roomler.*agent'
                             }
          }
          if ($stragglers.Count -gt 0) {
            throw "roomler-agent install record still present after uninstall: $($stragglers.DisplayName -join ', ')"
          }
          # P4b canonical layout: every component-managed payload must
          # be gone from Programs\Roomler (all files are component-
          # managed, and the wxs RemoveFolder pair drops the dir when
          # empty), and the TunnelExe component's user-PATH append
          # must have been removed (Environment Part='last' +
          # implicit Permanent='no').
          $installDir = Join-Path $env:LOCALAPPDATA 'Programs\Roomler'
          foreach ($f in @('roomlerd.exe', 'roomler-agent.exe', 'roomler.exe', 'wintun.dll')) {
            $p = Join-Path $installDir $f
            if (Test-Path $p) {
              throw "$f still at $p after uninstall — MSI uninstaller is broken"
            }
          }
          if (Test-Path $installDir) {
            Write-Host "::warning::$installDir still exists (empty dir tolerated; component files verified gone)"
            Get-ChildItem $installDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  leftover: $($_.FullName)" }
          }
          $userPath = (Get-ItemProperty -Path 'HKCU:\Environment' -ErrorAction SilentlyContinue).PATH
          if ($userPath -and $userPath -match [regex]::Escape('Programs\Roomler')) {
            throw "user PATH still contains Programs\Roomler after uninstall (HKCU\Environment PATH = '$userPath')"
          }
          Write-Host 'Uninstall left no traces: payload, install dir contents, PATH entry and MSI registry record all clean'

      - name: Upload MSI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msi-logs
          path: ${{ runner.temp }}/msi-logs/
          retention-days: 7
