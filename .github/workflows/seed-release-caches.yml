name: Seed release caches

# Dispatches an artifacts-only release-agent rehearsal on master whenever
# something that rotates or reshapes the release-lane caches lands:
#
#   - rust-toolchain.toml — a toolchain bump changes Swatinem/rust-cache's
#     env hash, orphaning every existing seed. This is exactly what
#     silently killed the 2026-07-15 seed and left every tag build fully
#     cold (~27 min Windows MSI job) until rc.208.
#   - .github/workflows/release-agent.yml — new or changed build steps
#     change what a useful seed contains.
#
# Why seeding matters at all: release jobs set
# `save-if: github.ref_type != 'tag'` because tag-ref cache saves can
# never be restored by a future tag run (GitHub cache isolation: own ref
# or default branch only). So the ONLY way tag builds ever get a warm
# cargo cache is a non-tag run on master saving one. The weekly
# `schedule:` trigger inside release-agent.yml bounds staleness in quiet
# weeks; this workflow closes the gap to ~zero on the two events that
# actually rotate the key. Cost: one ~30-min artifacts-only run per
# trigger (free minutes on a public repo).
#
# GITHUB_TOKEN-created `workflow_dispatch` events are one of the two
# documented exceptions to GitHub's no-recursive-triggering rule, so the
# default token with `actions: write` is sufficient here.

on:
  push:
    branches: [master]
    paths:
      - 'rust-toolchain.toml'
      - '.github/workflows/release-agent.yml'

permissions:
  actions: write
  contents: read

jobs:
  dispatch-rehearsal:
    name: Dispatch artifacts-only release-agent run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch release-agent.yml (publish_release=false)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Same [workspace.package] version grep as validate-version. If a
          # version bump races in between this push and the dispatch, the
          # rehearsal fails its version check in ~30 s — harmless; the next
          # trigger or the weekly cron re-seeds.
          version=$(awk '
            /^\[workspace\.package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && /^version[[:space:]]*=/ {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)
          echo "Dispatching seed rehearsal for workspace version ${version}"
          gh workflow run release-agent.yml --ref master \
            -f version="${version}" -f publish_release=false
