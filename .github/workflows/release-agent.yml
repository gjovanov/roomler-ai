name: Release roomler-agent

# Builds per-OS installers for the roomler-agent binary (MSI on Windows,
# notarised .pkg on macOS, .deb on Linux). Triggered either by pushing a
# tag matching `agent-v*` (publishes a GitHub Release) or manually via
# workflow_dispatch (uploads workflow artifacts for 30-day retention).
#
# Signing is *opt-in via secrets* — if the relevant secret is missing, the
# job emits an `-unsigned` artifact and a ::warning:: annotation, but does
# not fail. This lets us iterate on packaging before certs are in place.

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Agent version (e.g. 0.1.0) — must match workspace Cargo.toml'
        required: true
      publish_release:
        description: 'Create a GitHub Release with the artifacts'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 0. Validate that the requested version matches Cargo.toml.
  # ---------------------------------------------------------------------------
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      msi_version: ${{ steps.resolve.outputs.msi_version }}
      tag: ${{ steps.resolve.outputs.tag }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#agent-v}"
            is_release=true
          else
            version="${{ github.event.inputs.version }}"
            tag="agent-v${version}"
            if [[ "${{ github.event.inputs.publish_release }}" == "true" ]]; then
              is_release=true
            else
              is_release=false
            fi
          fi

          echo "Resolved: version=${version} tag=${tag} is_release=${is_release}"

          # Grep the [workspace.package] table for the declared version.
          cargo_version=$(awk '
            /^\[workspace\.package\]/ {in_section=1; next}
            /^\[/ {in_section=0}
            in_section && /^version[[:space:]]*=/ {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)

          echo "Cargo.toml workspace version: ${cargo_version}"

          if [[ "${cargo_version}" != "${version}" ]]; then
            echo "::error::Version mismatch: requested ${version} but Cargo.toml has ${cargo_version}"
            exit 1
          fi

          # Derive the MSI ProductVersion. Windows Installer IGNORES the
          # 4th (revision) version field for upgrade comparison, so the
          # raw semver `0.3.0-rc.N` — which cargo-wix maps to `0.3.0.N` —
          # made every rc look like the same `0.3.0` product: WiX
          # MajorUpgrade never saw a "newer" version, never removed the
          # prior one, and rc builds piled up (8 perMachine versions
          # found coexisting on a host 2026-06-01). Fix: put the rc in
          # the 3rd (build) field so MSI ProductVersions are monotonic —
          # `MAJOR.MINOR.RC`. A final (non-rc) release maps the build
          # field to 65535 so it outranks every rc of that minor. Only
          # the MSI-internal ProductVersion changes; the .msi *filename*
          # keeps the readable semver (see the rename steps below).
          # Assumes the project's `MAJOR.MINOR.0-rc.N` scheme (patch == 0
          # for rc builds) — fails loudly otherwise so the mapping can't
          # silently collide.
          if [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-rc\.([0-9]+)$ ]]; then
            vmajor="${BASH_REMATCH[1]}"; vminor="${BASH_REMATCH[2]}"
            vpatch="${BASH_REMATCH[3]}"; vrc="${BASH_REMATCH[4]}"
            if [[ "$vpatch" != "0" ]]; then
              echo "::error::rc builds must have patch == 0 (got ${version}); the MAJOR.MINOR.RC MSI mapping would collide with a patched rc"
              exit 1
            fi
            if (( vrc > 65535 )); then
              echo "::error::rc number ${vrc} exceeds the MSI build-field max (65535)"
              exit 1
            fi
            msi_version="${vmajor}.${vminor}.${vrc}"
          elif [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            msi_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.65535"
          else
            echo "::error::cannot derive an MSI version from '${version}' (expected MAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH-rc.N)"
            exit 1
          fi
          echo "Resolved MSI ProductVersion: ${msi_version} (from ${version})"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "msi_version=${msi_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 1. Linux — .deb via cargo-deb, bundles the systemd-user unit.
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build .deb (Linux x86_64)
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install system build deps
        run: |
          # libvpx-dev needed for the `vp9-444` feature (bindgen + link).
          # Ubuntu 24.04 (ubuntu-latest) ships libvpx 1.14.0 — bindgen
          # 0.68.1 + libclang handles its `vpx_codec_enc_cfg` struct
          # correctly; libvpx 1.16.x changes the header-include order
          # in a way that triggers a known bindgen forward-declaration
          # bug, so do not bump beyond apt's pinned version here.
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev \
            cmake libclang-dev pkg-config \
            libvpx-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo
        # `continue-on-error: true` so a flaky cache *save* (which
        # runs as a post-job step) can't sink an otherwise-green
        # build. Symptom from agent-v0.1.53 attempt 1: every build
        # step + smoke + artifact-upload succeeded but the post-job
        # tar/zstd write returned non-zero → job marked failure →
        # `Publish GitHub Release` skipped. The cache is an
        # optimisation, not a correctness gate.
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: agent-linux

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Fetch vendored FFmpeg 8.1.2 (for the ffmpeg-encoder HEVC backend)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Prebuilt LGPL FFmpeg 8.1.2 (nvenc/qsv/amf/vaapi/vulkan HEVC + the
          # LGPL libkvazaar SW encoder; NO GPL libx265 → the MIT agent stays
          # license-clean, matching the Windows vcpkg policy). Published once
          # at the `vendored-ffmpeg-8.1.2` release and reused by every build
          # instead of compiling FFmpeg from source: Ubuntu apt ships only
          # FFmpeg 6.1, but `ffmpeg-next = 8.1` needs 8.x.
          gh release download vendored-ffmpeg-8.1.2 \
            --repo "${{ github.repository }}" \
            --pattern 'ffmpeg-8.1.2-linux64-lgpl-shared.tar.xz' \
            --dir /tmp/ffdl
          sudo mkdir -p /opt/roomler-ffmpeg
          sudo tar xf /tmp/ffdl/ffmpeg-8.1.2-linux64-lgpl-shared.tar.xz \
            -C /opt/roomler-ffmpeg --strip-components=1
          # BtbN's pkgconfig files hardcode the build-machine prefix; rewrite
          # it to our extract path so pkg-config emits correct -L/-I flags.
          sudo sed -i "s|^prefix=.*|prefix=/opt/roomler-ffmpeg|" \
            /opt/roomler-ffmpeg/lib/pkgconfig/*.pc
          {
            echo "FFMPEG_DIR=/opt/roomler-ffmpeg"
            echo "PKG_CONFIG_PATH=/opt/roomler-ffmpeg/lib/pkgconfig"
            echo "LD_LIBRARY_PATH=/opt/roomler-ffmpeg/lib"
          } >> "$GITHUB_ENV"

      - name: Build agent (release, full + vp9-444 + vp9-444-bindgen)
        # `vp9-444` adds the libvpx VP9 profile-1 (8-bit 4:4:4) software
        # encoder for the DataChannel-bypass video transport (Phase Y in
        # docs/vp9-444-plan.md). Browser viewers that flip the
        # "Crystal-clear (VP9 4:4:4)" toolbar toggle expect this on the
        # other end.
        # `vp9-444-bindgen` enables `env-libvpx-sys/generate` so bindgen
        # runs against the system libvpx 1.14 headers; without this the
        # build script panics looking for `vpx-ffi-1.14.0.rs` in the
        # crate's `generated/` dir (only ships ≤ 1.13.0).
        # `overlay-l3` (Phase 3b) compiles in the Tailscale-style overlay mesh
        # (WireGuard via boringtun + the OS TUN device). `overlay-netstack` adds
        # the userspace-smoltcp OS-free surface (field-validated 2026-07-11
        # against the live overlay incl. a Check Point host). Both pure-Rust, no
        # extra system dep on Linux (/dev/net/tun is in-kernel; smoltcp needs
        # nothing). Default-OFF: an agent only joins the mesh when its config
        # sets `overlay_enabled`, and netstack mode additionally needs
        # `ROOMLER_AGENT_OVERLAY_NETSTACK_SOCKS=<port>` — so shipping both
        # everywhere is inert until an operator opts a host in.
        # `ffmpeg-encoder` adds the FFmpeg HEVC backend (hevc_nvenc / qsv / amf
        # / vaapi / vulkan) via the vendored FFmpeg 8.1.2 fetched above — the
        # Linux/WSL counterpart to the Windows MF/vcpkg HEVC path.
        run: cargo build -p roomler-agent --release --features "full,vp9-444,vp9-444-bindgen,overlay-l3,overlay-netstack,ffmpeg-encoder"

      - name: Bundle FFmpeg + its runtime deps into the .deb (self-contained, RPATH)
        run: |
          set -euo pipefail
          # Ubuntu 24.04 ships FFmpeg 6.1 (libavcodec.so.60) but the agent links
          # 8.1.2 (libavcodec.so.62), so the .deb must CARRY its own FFmpeg or it
          # won't start on a stock box. Ship each lib under its SONAME as a real
          # file (no symlinks) into /usr/lib/roomler-agent; RPATH wires it up.
          sudo apt-get update -qq && sudo apt-get install -y patchelf
          dst=agents/roomler-agent/vendor-ffmpeg
          rm -rf "$dst" && mkdir -p "$dst"
          for real in $(find /opt/roomler-ffmpeg/lib -maxdepth 1 -type f -name 'lib*.so.*'); do
            soname=$(patchelf --print-soname "$real")
            cp "$real" "$dst/$soname"
          done
          for lib in "$dst"/*.so.*; do patchelf --set-rpath '$ORIGIN' "$lib"; done
          patchelf --set-rpath '/usr/lib/roomler-agent' target/release/roomler-agent

          # Also bundle the TRANSITIVE runtime deps — libvpx, opus, vorbis, dav1d,
          # … — so the .deb loads on ANY glibc host, not just Ubuntu 24.04. The
          # vendored FFmpeg (and the vp9-444 feature) link these DYNAMICALLY
          # against the RUNNER's system copies (e.g. libvpx.so.9 from libvpx-dev);
          # they are NOT in /opt/roomler-ffmpeg/lib, so a 22.04 box (which has only
          # libvpx.so.7) aborts the agent at load with `libvpx.so.9: cannot open
          # shared object file` (the rc.164+ regression). Walk the ldd closure of
          # the binary + bundled libs to a fixed point, copying each dep under its
          # SONAME — EXCEPT (a) the glibc/loader/gcc runtime (must match the host
          # kernel) and (b) the libxcb/libX* X11 client libs (ABI-stable and
          # declared as .deb `depends`, present on every Ubuntu).
          host_re='^(ld-linux|libc|libm|libdl|libpthread|librt|libresolv|libnsl|libutil|libanl|libgcc_s|libstdc\+\+)\.so|^(libxcb|libXau|libXdmcp)'
          while :; do
            added=0
            for obj in target/release/roomler-agent "$dst"/*.so.*; do
              while read -r soname path; do
                if [ -z "$soname" ] || [ -z "$path" ]; then continue; fi
                if echo "$soname" | grep -Eq "$host_re"; then continue; fi
                if [ -e "$dst/$soname" ]; then continue; fi
                cp "$path" "$dst/$soname"
                patchelf --set-rpath '$ORIGIN' "$dst/$soname" 2>/dev/null || true
                echo "  + bundled transitive dep: $soname  ($path)"
                added=1
              done < <(LD_LIBRARY_PATH="$dst" ldd "$obj" 2>/dev/null | awk '/=> \//{print $1, $3}')
            done
            if [ "$added" -eq 0 ]; then break; fi
          done
          # Regression guard: libvpx MUST now be carried (its absence is the exact
          # 22.04 load failure); the runtime dlopen'd HW-encoder drivers (nvenc/
          # qsv/amf/vaapi/vulkan) are intentionally NOT bundled.
          if ! ls "$dst"/libvpx.so.* >/dev/null 2>&1; then
            echo "::error::libvpx not bundled — the .deb would fail to load on non-24.04 hosts"; exit 1
          fi
          echo "bundled: $(ls "$dst" | tr '\n' ' ')"
          echo "binary RUNPATH -> $(patchelf --print-rpath target/release/roomler-agent)"

      - name: Verify the bundled agent loads on stock Ubuntu 22.04
        run: |
          set -euo pipefail
          # The reported regression: rc.164+ agents abort on 22.04 with
          # `libvpx.so.9: cannot open shared object file`. Prove the bundle fixes
          # it — run the binary in a stock 22.04 container with ONLY the declared
          # `depends` (libxcb) installed + the bundle on LD_LIBRARY_PATH. If it
          # prints its version the .deb is self-contained; a missing lib is named
          # by the loader and fails CI here instead of in the field.
          docker run --rm -v "$PWD:/w" ubuntu:22.04 bash -euc '
            apt-get update -qq >/dev/null
            apt-get install -y -qq libxcb1 libxcb-shm0 libxcb-randr0 >/dev/null
            LD_LIBRARY_PATH=/w/agents/roomler-agent/vendor-ffmpeg \
              /w/target/release/roomler-agent --version
          '

      - name: Build .deb
        working-directory: agents/roomler-agent
        run: cargo deb --no-build --no-strip

      - name: Rename + checksum
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          src=$(ls target/debian/roomler-agent_*_amd64.deb | head -n1)
          dst="roomler-agent-${version}-x86_64-unknown-linux-gnu.deb"
          mv "$src" "$dst"
          sha256sum "$dst" | awk '{print $1"  "$2}' > "${dst}.sha256"
          echo "artifact=${dst}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            ${{ steps.pack.outputs.artifact }}
            ${{ steps.pack.outputs.artifact }}.sha256
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 2. Windows — MSI via cargo-wix. Unsigned unless WIN_CODESIGN_PFX_BASE64
  #    secret is present.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build .msi (Windows x86_64)
    needs: validate-version
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.validate-version.outputs.version }}
      # Monotonic MSI ProductVersion (rc in the 3rd/build field) so
      # MajorUpgrade fires — see the derivation in the validate-version
      # job. VERSION (the readable semver) still names the .msi files.
      MSI_VERSION: ${{ needs.validate-version.outputs.msi_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Locate LLVM (provides libclang for bindgen)
        shell: pwsh
        run: |
          # windows-latest ships LLVM (v20+) pre-installed under
          # C:\Program Files\LLVM. Just point bindgen at it — don't try to
          # downgrade via chocolatey (choco refuses without --allow-downgrade).
          $llvm = "C:\Program Files\LLVM"
          if (-not (Test-Path $llvm)) {
            choco install -y llvm
            $llvm = "C:\Program Files\LLVM"
          }
          "LIBCLANG_PATH=$llvm\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$llvm\bin"              | Out-File -FilePath $env:GITHUB_PATH -Append
          & "$llvm\bin\clang.exe" --version

      - name: Install pkg-config (env-libvpx-sys + ffmpeg-sys build scripts need it)
        shell: pwsh
        run: |
          # `env-libvpx-sys` / `ffmpeg-sys-next` build.rs shell out to
          # `pkg-config`; windows-latest ships none. We install vcpkg's
          # `pkgconf` — we already have vcpkg (pre-installed at C:\vcpkg,
          # used below for libvpx + FFmpeg), so this pulls from the vcpkg
          # registry, NOT SourceForge. The old `choco pkgconfiglite`
          # downloaded its binary from SourceForge, which timed out and
          # failed the rc.151 MSI build. Kept as a retried fallback.
          $got = $false
          if (Test-Path 'C:\vcpkg\vcpkg.exe') {
            C:\vcpkg\vcpkg.exe install pkgconf:x64-windows
            $tools = 'C:\vcpkg\installed\x64-windows\tools\pkgconf'
            if (Test-Path "$tools\pkgconf.exe") {
              # The *-sys scripts invoke the command `pkg-config`; pkgconf is
              # a drop-in replacement, so expose it under that name too.
              Copy-Item "$tools\pkgconf.exe" "$tools\pkg-config.exe" -Force
              $tools | Out-File -FilePath $env:GITHUB_PATH -Append
              $env:PATH = "$tools;$env:PATH"
              $got = $true
            }
          }
          if (-not $got) {
            Write-Host "vcpkg pkgconf unavailable — falling back to choco pkgconfiglite (SourceForge; retried)"
            for ($i = 1; $i -le 3; $i++) {
              choco install -y pkgconfiglite
              if (Get-Command pkg-config -ErrorAction SilentlyContinue) { break }
              Write-Host "pkgconfiglite attempt $i failed (likely SourceForge); retrying in 15s"
              Start-Sleep -Seconds 15
            }
          }
          # Fails the step loudly if neither path produced a usable pkg-config.
          pkg-config --version

      - name: Build libvpx 1.12.0 via vcpkg (matches pre-generated bindings)
        shell: pwsh
        run: |
          # We DON'T enable `vp9-444-bindgen` on Windows because bindgen
          # 0.68.1 + libclang on Windows has a regression that opaques
          # `vpx_codec_enc_cfg` (forward-declared in vpx_codec.h's union
          # before its full def in vpx_encoder.h) — every field becomes
          # `_address: u8` and the build collapses. Local-repro confirms
          # this on libvpx 1.12 / 1.13 / 1.16 alike, so it's not a
          # libvpx-version issue, it's a Windows-libclang issue.
          #
          # Workaround: skip bindgen entirely. env-libvpx-sys ships
          # pre-generated FFI for libvpx 1.3.0–1.13.0 (look in
          # ~/.cargo/registry/src/.../env-libvpx-sys-5.1.3/generated/).
          # build.rs picks the file matching pkg-config's reported
          # version EXACTLY. We pin to 1.12.0 because vcpkg has it (the
          # 1.13.0 entry was bumped to 1.13.1, which env-libvpx-sys
          # doesn't ship a pre-generated file for).
          # windows-latest pre-installs vcpkg at C:\vcpkg. Reuse it if
          # present (skip clone + bootstrap), otherwise install fresh.
          if (-not (Test-Path 'C:\vcpkg\vcpkg.exe')) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          } else {
            Write-Host "Using pre-installed vcpkg at C:\vcpkg"
          }
          # Need full history to resolve the 1.12.0 baseline (the
          # baseline commit must contain the version-specific git-tree
          # entry vcpkg looks up). `git fetch --unshallow` errors on
          # already-complete repos, so probe first.
          if ((git -C C:\vcpkg rev-parse --is-shallow-repository) -eq 'true') {
            git -C C:\vcpkg fetch --unshallow
          } else {
            git -C C:\vcpkg fetch --tags
          }
          New-Item -ItemType Directory -Path C:\vpx-pin -Force | Out-Null
          @'
          {
            "name": "roomler-vpx-pin",
            "version": "0.0.1",
            "dependencies": [{"name": "libvpx", "version>=": "1.12.0"}],
            "overrides":    [{"name": "libvpx", "version":   "1.12.0"}],
            "builtin-baseline": "4d73751b3428ef49a7ac5d5df696b92e302de993"
          }
          '@ | Set-Content -Encoding utf8 C:\vpx-pin\vcpkg.json
          Push-Location C:\vpx-pin
          C:\vcpkg\vcpkg.exe install --triplet=x64-windows --x-install-root=C:\vpx-pin\installed
          Pop-Location
          # Expose the install dir to subsequent steps.
          "PKG_CONFIG_PATH=C:/vpx-pin/installed/x64-windows/lib/pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          # libvpx ships as DLL on x64-windows; copy alongside the agent
          # binary so encoder-smoke + the MSI bundle find it at runtime.
          # The MSI will pick up the DLL via the harvested target dir.
          "VPX_DLL_DIR=C:/vpx-pin/installed/x64-windows/bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      # =======================================================================
      # rc.65: Option B HEVC plan — install FFmpeg via vcpkg so ffmpeg-next
      # 8.x can link against it. Cold build is 25-40 min (FFmpeg + ffnvcodec +
      # intel-media-sdk + amf), so the cache is load-bearing. Cache key
      # composition follows the critique's recommendation: deps content hash
      # plus the triplet, so a port-edit invalidates the cache cleanly.
      #
      # `nvcodec` pulls ffnvcodec headers (NVIDIA Video Codec SDK headers
      # only — NVENC itself loads at runtime from the user's NVIDIA driver,
      # so no extra MSI bytes for NVIDIA users).
      # `qsv` pulls intel-media-sdk → static libmfx (~3-5 MB, statically
      # linked into the agent).
      # `amf` pulls amf headers (AMD AMF runtime DLL loaded from driver).
      # `libvpx` opt-in builds libvpx into FFmpeg so `libvpx-vp9` is
      # available as a SW fallback (separate from our existing
      # env-libvpx-sys binding which talks to libvpx directly).
      # =======================================================================
      - name: Compute FFmpeg vcpkg cache key
        id: ffmpeg_cache_key
        shell: pwsh
        run: |
          # Cache key invalidates when: vcpkg baseline changes, our feature
          # set changes, or the agent crate version changes (defensive
          # against a port-edit slipping past the manifest diff).
          # rc.67 hotfix: rc.66 failed with "no version database entry for
          # vcpkg-tool-meson at 1.9.0#8". Root cause: the pre-installed
          # vcpkg's working tree is at an older commit than my baseline
          # references — its version database doesn't know about the version
          # entries my baseline expects. Fix: add explicit `git fetch +
          # reset --hard` step to bring local vcpkg to the same commit as my
          # baseline (pinned to the most recent ffmpeg-port commit
          # `ccab4e210c...`, 2026-05-08, which ships ffmpeg 8.1.1+cbs-backport).
          $manifest = @"
          {
            "name": "roomler-ffmpeg-pin",
            "version": "0.0.1",
            "dependencies": [
              {"name": "ffmpeg", "features": ["avcodec", "avformat", "avfilter", "avdevice", "swresample", "swscale", "nvcodec", "qsv", "amf", "vpx"]}
            ],
            "builtin-baseline": "ccab4e210cbfb237aab29423a63108958949ef3c"
          }
          "@
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream ([IO.MemoryStream]::new([Text.Encoding]::UTF8.GetBytes($manifest)))).Hash.Substring(0, 12)
          # rc.76: bumped cache key to v2 because the triplet changed from
          # x64-windows (dynamic, DLLs) to x64-windows-static-md (static
          # libs). Same manifest content but different cached artifacts.
          $key = "ffmpeg-vcpkg-v2-static-md-$hash"
          Write-Host "FFmpeg cache key: $key"
          "key=$key" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          # Stash the manifest content for the install step.
          $manifest | Out-File -Encoding utf8 ffmpeg_manifest.json
          "FFMPEG_MANIFEST_PATH=$((Get-Location).Path)\ffmpeg_manifest.json" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore FFmpeg vcpkg cache
        id: ffmpeg_cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            C:\ffmpeg-pin\installed
            C:\ffmpeg-pin\vcpkg.json
          key: ${{ steps.ffmpeg_cache_key.outputs.key }}

      - name: Update local vcpkg to match FFmpeg baseline
        # rc.67 hotfix: the pre-installed vcpkg's working tree is at an older
        # commit than my manifest baseline references. vcpkg's version DB
        # depends on the working tree — entries my baseline expects (e.g.,
        # vcpkg-tool-meson@1.9.0#8) don't exist in the older tree. Fix:
        # fetch + reset --hard to bring local vcpkg up to the baseline commit.
        # libvpx step's install is already in C:\vpx-pin\installed — separate
        # tree, untouched by this checkout.
        shell: pwsh
        run: |
          cd C:\vcpkg
          # libvpx step already did fetch --tags / --unshallow, so origin
          # is current. Reset to my chosen baseline.
          git fetch origin
          git reset --hard ccab4e210cbfb237aab29423a63108958949ef3c
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Failed to checkout vcpkg to baseline ccab4e21. Either the commit doesn't exist on origin or git operations failed."
            exit 1
          }
          # Re-bootstrap vcpkg.exe if it's missing (it gets blown away by
          # `git reset --hard` if the commit predates the precompiled exe).
          if (-not (Test-Path .\vcpkg.exe)) {
            Write-Host "vcpkg.exe missing after reset — bootstrapping"
            .\bootstrap-vcpkg.bat -disableMetrics
          }
          .\vcpkg.exe version

      - name: Build FFmpeg via vcpkg (encode-only HW backends)
        shell: pwsh
        run: |
          if (Test-Path 'C:\ffmpeg-pin\installed\x64-windows-static-md\lib\pkgconfig\libavcodec.pc') {
            Write-Host "FFmpeg already installed (cache hit) — skipping vcpkg build"
          } else {
            Write-Host "Cold build — installing FFmpeg via vcpkg (expect 25-40 min)"
            New-Item -ItemType Directory -Path C:\ffmpeg-pin -Force | Out-Null
            Copy-Item $env:FFMPEG_MANIFEST_PATH C:\ffmpeg-pin\vcpkg.json -Force
            Push-Location C:\ffmpeg-pin
            # rc.76: switched from x64-windows (dynamic, DLLs) to
            # x64-windows-static-md (static libs + dynamic MS runtime,
            # Rust-compatible). Pre-rc.72 the FFmpeg link was effectively
            # dead-stripped (no symbols called from non-test paths), so
            # x64-windows shipped DLL-less MSIs that happened to work.
            # rc.72 added actual FFmpeg calls in FfmpegEncoder, so the
            # link became real and the missing-DLL bug surfaced at
            # install time (avcodec-62.dll not found). Static linkage
            # bundles FFmpeg into the EXE — no DLLs to ship.
            C:\vcpkg\vcpkg.exe install --triplet=x64-windows-static-md --x-install-root=C:\ffmpeg-pin\installed
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::vcpkg install ffmpeg failed — see logs above. rc.67 cannot proceed without this."
              exit 1
            }
            Pop-Location
          }
          # Verify the pkg-config files we need actually landed.
          $required = @('libavcodec.pc', 'libavutil.pc')
          foreach ($pc in $required) {
            $p = "C:\ffmpeg-pin\installed\x64-windows-static-md\lib\pkgconfig\$pc"
            if (-not (Test-Path $p)) {
              Write-Host "::error::Expected pkg-config file missing: $p"
              exit 1
            }
          }
          Write-Host "FFmpeg pkg-config files present at C:\ffmpeg-pin\installed\x64-windows-static-md\lib\pkgconfig\"

      - name: Append FFmpeg to PKG_CONFIG_PATH + DLL PATH
        shell: pwsh
        run: |
          # libvpx step already set PKG_CONFIG_PATH=C:/vpx-pin/...; ffmpeg
          # needs to extend, not replace. Read current value, append ffmpeg
          # path, write back. Windows pkg-config uses ';' as separator.
          $existing = [Environment]::GetEnvironmentVariable('PKG_CONFIG_PATH', 'Process')
          if ([string]::IsNullOrEmpty($existing)) { $existing = "" } else { $existing = "$existing;" }
          $combined = "${existing}C:/ffmpeg-pin/installed/x64-windows-static-md/lib/pkgconfig"
          "PKG_CONFIG_PATH=$combined" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "PKG_CONFIG_PATH=$combined"
          # rc.71 hotfix: vcpkg's x64-windows triplet produces DLLs for
          # ffmpeg (libavcodec-*.dll etc.), not static libs. The agent test
          # binary links against them at compile time but Windows can't
          # find them at runtime (STATUS_DLL_NOT_FOUND, 0xc0000135 — rc.69
          # CI failure). Add the ffmpeg bin dir to GITHUB_PATH so cargo test
          # picks it up. Also stash for the MSI staging step below.
          "C:\ffmpeg-pin\installed\x64-windows-static-md\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "FFMPEG_DLL_DIR=C:\ffmpeg-pin\installed\x64-windows-static-md\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo
        # `continue-on-error: true` so a flaky cache *save* (which
        # runs as a post-job step) can't sink an otherwise-green
        # build. Symptom from agent-v0.1.53 attempt 1: every build
        # step + smoke + artifact-upload succeeded but the post-job
        # tar/zstd write returned non-zero → job marked failure →
        # `Publish GitHub Release` skipped. The cache is an
        # optimisation, not a correctness gate.
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: agent-windows-vp9-444

      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          choco install -y wixtoolset
          # WiX v3 installs to C:\Program Files (x86)\WiX Toolset v3.14\bin by
          # default — add to PATH for this and subsequent steps.
          $wixBin = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v*\bin" | Select-Object -First 1
          "$($wixBin.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build agent (release, full-hw + vp9-444 + system-context + ffmpeg-encoder)
        # `vp9-444` (without `-bindgen`) uses env-libvpx-sys's
        # pre-generated FFI — no libclang invocation, no
        # forward-decl-opaque issue. pkg-config still has to find
        # `vpx.pc` (which the vcpkg step exported via PKG_CONFIG_PATH);
        # the linker resolves vpx.lib from the pkg-config-emitted
        # `-L`. No INCLUDE / vcvars dance needed.
        #
        # `system-context` (added 0.3.0) compiles the M3 A1 SYSTEM-
        # context worker plumbing: DXGI Desktop Duplication backend,
        # GDI BitBlt fallback, SetThreadDesktop input rebind, and
        # winlogon-token spawn. The perMachine MSI's SCM service
        # exercises this code path to drive the lock screen / UAC.
        # The perUser MSI gets the same binary but `worker_role::
        # probe_self()` returns `User` (perUser is never spawned as
        # LocalSystem) so none of the SystemContext code ever fires
        # — the perUser path stays exactly as it was in 0.2.7.
        #
        # rc.65: `ffmpeg-encoder` adds the ffmpeg-next dep and exercises
        # the FFmpeg link via `linked_libavcodec_version()`. The actual
        # encoder backend lands in rc.66 — for now this RC verifies:
        # (a) ffmpeg-next 8.x compiles against vcpkg's FFmpeg
        # (b) hevc_qsv + vp9_qsv symbols are reachable (asserted by the
        #     unit test `libavcodec_version_is_ffmpeg_7_or_newer`)
        # (c) MSI size delta vs rc.64 is within budget (≤ +8 MB; HARD
        #     STOP enforced by the next step at +12 MB)
        shell: pwsh
        # `overlay-l3` (Phase 3b): the overlay mesh (WireGuard + TUN). The
        # binary compiles overlay in everywhere, but on Windows the TUN is
        # Wintun, which LoadLibrary's a signed `wintun.dll` at runtime —
        # NOT yet bundled in the MSI (follow-up: a `WintunDll` wxs
        # component in both wix/ + wix-perMachine/ + a download step). So
        # overlay on Windows degrades gracefully (SystemTun::up fails →
        # the runtime logs + aborts → the agent runs normally) until that
        # lands; Linux (/dev/net/tun) + macOS (utun) need no extra dep and
        # work today. Default-OFF (config `overlay_enabled`).
        run: cargo build -p roomler-agent --release --features "full-hw,vp9-444,system-context,ffmpeg-encoder,overlay-l3,overlay-netstack"

      - name: Verify FFmpeg link via unit test
        # Runs ONLY the ffmpeg-encoder gated test, which calls into
        # ffmpeg-next's FFI to assert libavcodec version is FFmpeg 7+.
        # This is the load-bearing verification step for rc.65: if the
        # link is wrong or symbols don't match, this test fails before
        # MSI packaging starts. Keeps CI iteration tight.
        shell: pwsh
        env:
          RUST_LOG: roomler_agent=debug,info
        run: |
          cargo test -p roomler-agent --lib --features ffmpeg-encoder encode::ffmpeg::tests::libavcodec_version_is_ffmpeg_7_or_newer -- --nocapture
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::FFmpeg link verification failed. ffmpeg-next + vcpkg ffmpeg version pair is incompatible — re-pin one of them in agents/roomler-agent/Cargo.toml or the cache key step above."
            exit 1
          }

      - name: Stage vpx.dll alongside agent binary (if not statically linked)
        shell: pwsh
        run: |
          # vcpkg's `x64-windows` triplet for libvpx produces a static
          # .lib + .pdb only — no .dll. The agent binary links libvpx
          # statically and runs without a separate DLL. If a future
          # vcpkg port (or a triplet swap) produces a vpx.dll, copy it
          # next to roomler-agent.exe so cargo-wix harvests it. No-op
          # when the DLL isn't there.
          $dll = Join-Path $env:VPX_DLL_DIR "vpx.dll"
          if (Test-Path $dll) {
            Copy-Item $dll target\release\
            Write-Host "Staged vpx.dll for MSI harvest"
          } else {
            Write-Host "No vpx.dll under $env:VPX_DLL_DIR — static linkage, nothing to stage"
          }

      - name: Stage FFmpeg DLLs alongside agent binary (no-op for static-md)
        # rc.76: triplet switched to x64-windows-static-md so no FFmpeg
        # DLLs exist — FFmpeg is statically linked into the EXE. This
        # step becomes a soft no-op when FFMPEG_DLL_DIR is empty or
        # doesn't exist (vs the rc.71 hard error). Kept around in case
        # we ever switch back to a dynamic triplet for size reasons.
        shell: pwsh
        run: |
          if (-not (Test-Path $env:FFMPEG_DLL_DIR)) {
            Write-Host "No bin dir under $env:FFMPEG_DLL_DIR — static-md triplet, nothing to stage."
            exit 0
          }
          $dlls = Get-ChildItem -Path $env:FFMPEG_DLL_DIR -Filter "*.dll"
          if ($dlls.Count -eq 0) {
            Write-Host "No DLLs under $env:FFMPEG_DLL_DIR — static-md triplet, nothing to stage."
            exit 0
          }
          foreach ($dll in $dlls) {
            Copy-Item $dll.FullName target\release\
          }
          Write-Host "Staged $($dlls.Count) FFmpeg DLLs for MSI harvest:"
          foreach ($dll in $dlls) {
            Write-Host "  $($dll.Name) ($([math]::Round($dll.Length / 1KB, 0)) KB)"
          }

      - name: Encoder smoke test (MF cascade → openh264 fallback)
        shell: pwsh
        env:
          RUST_LOG: roomler_agent=debug,info
        run: |
          # Probe the hardware encoder path. On windows-latest the runner
          # exposes a WARP software D3D11 device; the MS H264 Encoder MFT
          # falls back to its SW path there, which is enough for "it loads,
          # negotiates types, produces an IDR, no SEH crash". Debug logging
          # surfaces STREAM_CHANGE notifications and per-frame byte counts
          # so regressions in the MF drain path are visible in CI output.
          & "target\release\roomler-agent.exe" encoder-smoke --encoder hardware

      - name: Stage wintun.dll for the overlay TUN (overlay-l3 MSI bundle)
        shell: pwsh
        run: |
          # overlay-l3's Windows TUN is Wintun, whose signed wintun.dll is
          # LoadLibrary'd at runtime from the app dir. Fetch the official
          # build (WireGuard LLC, Authenticode-signed) and stage the amd64
          # DLL next to the EXE so the `WintunDll` wxs component (in both
          # wix/ + wix-perMachine/) bundles it into both MSIs. The build
          # above includes overlay-l3, so the agent will LoadLibrary this.
          $ver = '0.14.1'
          $zip = "$env:RUNNER_TEMP\wintun.zip"
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-$ver.zip" -OutFile $zip -UseBasicParsing
          $dest = "$env:RUNNER_TEMP\wintun"
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          $dll = Join-Path $dest 'wintun\bin\amd64\wintun.dll'
          if (-not (Test-Path $dll)) { Write-Host "::error::wintun.dll (amd64) not found in the downloaded archive"; exit 1 }
          $sig = Get-AuthenticodeSignature $dll
          Write-Host "wintun.dll signature: $($sig.Status) -- signer: $($sig.SignerCertificate.Subject)"
          Copy-Item $dll target\release\wintun.dll -Force
          Write-Host "Staged wintun.dll ($([math]::Round((Get-Item target\release\wintun.dll).Length/1KB,0)) KB) for the MSI bundle"

      - name: Build MSI (per-User)
        shell: pwsh
        run: |
          # cargo-wix reads agents/roomler-agent/wix/main.wxs and sets the
          # Version preprocessor variable from --install-version.
          cargo wix -p roomler-agent --nocapture --no-build --install-version $env:MSI_VERSION

      - name: Locate + rename per-User MSI
        id: locate
        shell: pwsh
        run: |
          $msi = Get-ChildItem "target/wix/*.msi" | Select-Object -First 1
          if (-not $msi) { throw "per-User MSI not produced" }
          $suffix = "-unsigned"
          $signed = $env:WIN_CODESIGN_PFX_BASE64
          if ($signed -and $signed.Length -gt 0) { $suffix = "" }
          $dst = "roomler-agent-$env:VERSION-x86_64-pc-windows-msvc$suffix.msi"
          Move-Item $msi.FullName $dst
          "artifact=$dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        env:
          WIN_CODESIGN_PFX_BASE64: ${{ secrets.WIN_CODESIGN_PFX_BASE64 }}

      - name: Build MSI (per-Machine)
        shell: pwsh
        run: |
          # cargo-wix auto-discovers every *.wxs under wix/, so the
          # per-Machine source lives in a sibling wix-perMachine/ dir
          # to keep it OUT of the per-User build's compile set.
          # For this run we copy that file over wix/main.wxs (after
          # backing up the original), invoke cargo wix again, and
          # restore. Both MSIs end up in target/wix/ and we rename
          # to disambiguate. Different UpgradeCode + the mutually-
          # exclusive LaunchConditions ensure a host can only ever
          # have one of the two installed at a time.
          $wixDir = "agents\roomler-agent\wix"
          $pmSrc  = "agents\roomler-agent\wix-perMachine\main.wxs"
          Copy-Item "$wixDir\main.wxs" "$wixDir\main.wxs.bak" -Force
          Copy-Item $pmSrc "$wixDir\main.wxs" -Force
          try {
            cargo wix -p roomler-agent --nocapture --no-build --install-version $env:MSI_VERSION
          } finally {
            Move-Item "$wixDir\main.wxs.bak" "$wixDir\main.wxs" -Force
          }

      - name: Locate + rename per-Machine MSI
        id: locate_pm
        shell: pwsh
        run: |
          $msi = Get-ChildItem "target/wix/*.msi" | Select-Object -First 1
          if (-not $msi) { throw "per-Machine MSI not produced" }
          $suffix = "-unsigned"
          $signed = $env:WIN_CODESIGN_PFX_BASE64
          if ($signed -and $signed.Length -gt 0) { $suffix = "" }
          $dst = "roomler-agent-$env:VERSION-perMachine-x86_64-pc-windows-msvc$suffix.msi"
          Move-Item $msi.FullName $dst
          "artifact=$dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        env:
          WIN_CODESIGN_PFX_BASE64: ${{ secrets.WIN_CODESIGN_PFX_BASE64 }}

      - name: Verify MSI size delta (rc.65 Option B budget)
        # rc.63 baseline (last release before ffmpeg-encoder): 8.02 MB per-User + 8.02 MB per-Machine.
        # rc.65 budget: +8 MB compressed = 16 MB ceiling. Hard fail at
        # +12 MB = 20 MB to guard against accidentally bundling an
        # unstripped FFmpeg (would land closer to +20 MB).
        #
        # Per the Option B plan critique: MSI > +8 MB compressed →
        # regroup before rc.66. > +12 MB → STOP, the entire ffmpeg-next
        # approach loses to direct-NVENC alternative.
        shell: pwsh
        run: |
          $msiPerUser = (Get-Item "${{ steps.locate.outputs.artifact }}").Length / 1MB
          $msiPerMachine = (Get-Item "${{ steps.locate_pm.outputs.artifact }}").Length / 1MB
          $maxMsi = [math]::Max($msiPerUser, $msiPerMachine)
          $rc63Baseline = 8.0
          $deltaMB = $maxMsi - $rc63Baseline
          Write-Host "::notice::per-User MSI = $([math]::Round($msiPerUser, 2)) MB"
          Write-Host "::notice::per-Machine MSI = $([math]::Round($msiPerMachine, 2)) MB"
          Write-Host "::notice::rc.63 baseline = $rc63Baseline MB; delta = $([math]::Round($deltaMB, 2)) MB"
          if ($maxMsi -gt 24) {
            Write-Host "::error::MSI exceeds 24 MB hard ceiling ($([math]::Round($maxMsi, 2)) MB). Option B size budget violated. Investigate whether ffmpeg has dragged in unintended features."
            exit 1
          } elseif ($deltaMB -gt 8) {
            Write-Host "::warning::MSI delta $([math]::Round($deltaMB, 2)) MB exceeds +8 MB target (still under 12 MB hard ceiling). Consider feature-stripping FFmpeg before rc.66."
          } else {
            Write-Host "::notice::MSI delta within +8 MB budget — Option B size target met."
          }

      # rc.18: build the Tauri tray companion alongside the agent.
      # Tray's Cargo.toml uses `frontendDist: "../src/front"` pointing
      # at static HTML/CSS/JS — no front-end bundler step needed.
      # The build.rs generates placeholder icons if missing so this
      # works without an offline icon-prep step. Released as a plain
      # EXE for rc.18; cargo-tauri MSI bundling defers to rc.19.
      - name: Build tray binary (release)
        shell: pwsh
        run: cargo build -p roomler-agent-tray --release

      - name: Locate + rename tray EXE
        id: locate_tray
        shell: pwsh
        run: |
          $exe = "target/release/roomler-agent-tray.exe"
          if (-not (Test-Path $exe)) { throw "tray EXE not produced" }
          $suffix = "-unsigned"
          $signed = $env:WIN_CODESIGN_PFX_BASE64
          if ($signed -and $signed.Length -gt 0) { $suffix = "" }
          $dst = "roomler-agent-tray-$env:VERSION-x86_64-pc-windows-msvc$suffix.exe"
          Copy-Item $exe $dst
          "artifact=$dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        env:
          WIN_CODESIGN_PFX_BASE64: ${{ secrets.WIN_CODESIGN_PFX_BASE64 }}

      # rc.28: build the installer wizard EXE. Like the tray, it ships
      # as a plain Authenticode-signed `.exe` operators double-click;
      # MSI bundling deferred. The lib target is named `wizard_core`
      # (NOT `roomler_installer`) so cargo's test-binary names dodge
      # Windows UAC's "installer detection" filename heuristic; the
      # user-facing bin EXE keeps the marketing-friendly name.
      - name: Build installer wizard EXE (release)
        shell: pwsh
        run: cargo build -p roomler-installer --release

      - name: Locate + rename installer wizard EXE
        id: locate_installer
        shell: pwsh
        run: |
          $exe = "target/release/roomler-installer.exe"
          if (-not (Test-Path $exe)) { throw "installer EXE not produced" }
          $suffix = "-unsigned"
          $signed = $env:WIN_CODESIGN_PFX_BASE64
          if ($signed -and $signed.Length -gt 0) { $suffix = "" }
          $dst = "roomler-installer-$env:VERSION-x86_64-pc-windows-msvc$suffix.exe"
          Copy-Item $exe $dst
          "artifact=$dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        env:
          WIN_CODESIGN_PFX_BASE64: ${{ secrets.WIN_CODESIGN_PFX_BASE64 }}

      - name: Authenticode sign (MSIs + tray + installer wizard)
        if: env.WIN_CODESIGN_PFX_BASE64 != ''
        shell: pwsh
        env:
          WIN_CODESIGN_PFX_BASE64: ${{ secrets.WIN_CODESIGN_PFX_BASE64 }}
          WIN_CODESIGN_PASSWORD:   ${{ secrets.WIN_CODESIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WIN_CODESIGN_PFX_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1
          # rc.28: BLOCKER-10 fix from the plan critique — the installer
          # wizard EXE MUST be signed so corporate ESET / Defender don't
          # quarantine it as a "downloader trojan" (the EXE downloads
          # MSIs + invokes msiexec, which trips every AV heuristic
          # without a code-signing cert). Tray EXE signing is the
          # zero-cost bonus.
          & $signtool.FullName sign `
              /f $pfxPath `
              /p $env:WIN_CODESIGN_PASSWORD `
              /fd SHA256 `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              "${{ steps.locate.outputs.artifact }}" `
              "${{ steps.locate_pm.outputs.artifact }}" `
              "${{ steps.locate_tray.outputs.artifact }}" `
              "${{ steps.locate_installer.outputs.artifact }}"

          Remove-Item $pfxPath -Force

      - name: Warn on unsigned build
        if: env.WIN_CODESIGN_PFX_BASE64 == ''
        shell: bash
        run: echo "::warning::WIN_CODESIGN_PFX_BASE64 not set — MSIs + tray + installer EXEs are unsigned. SmartScreen will flag 'Unknown publisher' and ESET may quarantine the installer."
        env:
          WIN_CODESIGN_PFX_BASE64: ${{ secrets.WIN_CODESIGN_PFX_BASE64 }}

      - name: SHA256 checksum (all 4 artifacts)
        shell: pwsh
        run: |
          $files = @(
            "${{ steps.locate.outputs.artifact }}",
            "${{ steps.locate_pm.outputs.artifact }}",
            "${{ steps.locate_tray.outputs.artifact }}",
            "${{ steps.locate_installer.outputs.artifact }}"
          )
          foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
            "$hash  $f" | Out-File -Encoding ascii "$f.sha256"
          }

      - name: Upload artifacts (per-User + per-Machine + tray + installer)
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: |
            ${{ steps.locate.outputs.artifact }}
            ${{ steps.locate.outputs.artifact }}.sha256
            ${{ steps.locate_pm.outputs.artifact }}
            ${{ steps.locate_pm.outputs.artifact }}.sha256
            ${{ steps.locate_tray.outputs.artifact }}
            ${{ steps.locate_tray.outputs.artifact }}.sha256
            ${{ steps.locate_installer.outputs.artifact }}
            ${{ steps.locate_installer.outputs.artifact }}.sha256
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. macOS — signed + notarised .pkg. Unsigned unless Apple secrets present.
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build .pkg (macOS arm64)
    needs: validate-version
    runs-on: macos-14
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.validate-version.outputs.version }}
      # Mirror the signing secrets into env once so the `if:` guards below can
      # reference `env.*` instead of `secrets.*` (secrets are not allowed in
      # step-level `if:` conditions).
      APP_P12_BASE64:       ${{ secrets.APPLE_DEVELOPER_ID_APP_P12_BASE64 }}
      INSTALLER_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
      CERT_PASSWORD:        ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_API_KEY_ID:        ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID:     ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        # `continue-on-error: true` so a flaky cache *save* (which
        # runs as a post-job step) can't sink an otherwise-green
        # build. Symptom from agent-v0.1.53 attempt 1: every build
        # step + smoke + artifact-upload succeeded but the post-job
        # tar/zstd write returned non-zero → job marked failure →
        # `Publish GitHub Release` skipped. The cache is an
        # optimisation, not a correctness gate.
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: agent-macos

      - name: Install system deps
        # libvpx for the `vp9-444` feature; pkg-config for the
        # env-libvpx-sys build script. brew's libvpx is currently 1.15
        # which has the same well-formed header layout as 1.14 (the
        # libvpx 1.16 forward-decl regression that breaks bindgen on
        # Windows is upstream-only-on-1.16, so brew's 1.15 works).
        run: brew install cmake libvpx pkg-config

      - name: Fetch vendored FFmpeg 8.1.2 (for the ffmpeg-encoder HEVC backend)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Prebuilt LGPL FFmpeg 8.1.2 for Apple Silicon (HEVC via
          # hevc_videotoolbox; no GPL libx264/x265 → the MIT agent stays
          # license-clean). Built once by vendor-ffmpeg-macos.yml and fetched
          # here — the macOS counterpart to the Linux BtbN vendored build.
          gh release download vendored-ffmpeg-8.1.2 \
            --repo "${{ github.repository }}" \
            --pattern 'ffmpeg-8.1.2-macos-arm64-lgpl-shared.tar.xz' \
            --dir "$RUNNER_TEMP/ffdl"
          FFPREFIX="$RUNNER_TEMP/roomler-ffmpeg"
          mkdir -p "$FFPREFIX"
          # Tarball root is lib/ + include/ (no top dir) — no --strip-components.
          tar xf "$RUNNER_TEMP/ffdl/ffmpeg-8.1.2-macos-arm64-lgpl-shared.tar.xz" -C "$FFPREFIX"
          # .pc prefix is baked to the builder's path; rewrite it (BSD sed).
          sed -i '' "s|^prefix=.*|prefix=$FFPREFIX|" "$FFPREFIX"/lib/pkgconfig/*.pc
          {
            echo "FFMPEG_DIR=$FFPREFIX"
            # Prepend ffmpeg but KEEP the default pc_path so brew's libvpx.pc
            # (vp9-444) still resolves.
            echo "PKG_CONFIG_PATH=$FFPREFIX/lib/pkgconfig:$(pkg-config --variable pc_path pkg-config)"
            echo "FFPREFIX=$FFPREFIX"
          } >> "$GITHUB_ENV"

      - name: Build agent (release, full + vp9-444 + vp9-444-bindgen + ffmpeg-encoder)
        # `vp9-444-bindgen` runs bindgen against brew's libvpx 1.16
        # headers — env-libvpx-sys's pre-generated bindings only cover
        # 1.13.0, so without bindgen the build script panics looking
        # for `generated/vpx-ffi-1.16.0.rs`. macOS bindgen + libclang
        # has none of the Windows opaque-struct issue, so this just
        # works.
        # `overlay-l3` (Phase 3b): the overlay mesh (WireGuard + TUN, utun
        # on macOS — in-kernel, no extra dep). Default-OFF (config
        # `overlay_enabled`), inert until an operator opts a host in.
        # `ffmpeg-encoder`: HEVC via the vendored FFmpeg fetched above
        # (hevc_videotoolbox on Apple Silicon) — the macOS counterpart to the
        # Linux/Windows HEVC path.
        run: cargo build -p roomler-agent --release --features "full,vp9-444,vp9-444-bindgen,overlay-l3,overlay-netstack,ffmpeg-encoder" --target aarch64-apple-darwin

      - name: Stage .app bundle
        shell: bash
        run: |
          set -euo pipefail
          BIN=target/aarch64-apple-darwin/release/roomler-agent
          APP=stage/roomler-agent.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/roomler-agent"
          # Bundle the vendored FFmpeg dylibs into the .app so it's
          # self-contained (macOS ships no FFmpeg). They carry @rpath install
          # names (built --install-name-dir=@rpath), so a single LC_RPATH of
          # @executable_path/../Frameworks on the binary resolves BOTH the
          # binary's FFmpeg deps and the dylibs' siblings — the macOS analog of
          # the Linux $ORIGIN patchelf.
          mkdir -p "$APP/Contents/Frameworks"
          cp -a "$FFPREFIX"/lib/*.dylib "$APP/Contents/Frameworks/"
          install_name_tool -add_rpath "@executable_path/../Frameworks" "$APP/Contents/MacOS/roomler-agent"
          echo "=== FFmpeg load commands (want @rpath/libav*) ==="
          otool -L "$APP/Contents/MacOS/roomler-agent" | grep -E '@rpath/lib(av|sw)' || true
          echo "=== self-containment check: staged arm64 binary loads its bundled FFmpeg? ==="
          # macos-14 is arm64, so the aarch64 binary runs here; if the rpath +
          # bundled dylibs are wrong, dyld fails and this step (set -e) fails.
          "$APP/Contents/MacOS/roomler-agent" --version
          cp agents/roomler-agent/packaging/macos/com.roomler.agent.plist "$APP/Contents/Resources/"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>          <string>roomler-agent</string>
              <key>CFBundleIdentifier</key>          <string>com.roomler.agent</string>
              <key>CFBundleName</key>                <string>Roomler Agent</string>
              <key>CFBundleShortVersionString</key>  <string>${VERSION}</string>
              <key>CFBundleVersion</key>             <string>${VERSION}</string>
              <key>CFBundlePackageType</key>         <string>APPL</string>
              <key>LSMinimumSystemVersion</key>      <string>12.0</string>
              <key>LSUIElement</key>                 <true/>
              <key>NSPrincipalClass</key>            <string>NSApplication</string>
              <key>NSScreenCaptureUsageDescription</key>
                  <string>Roomler Agent captures the screen to stream it to an authorised remote controller.</string>
              <key>NSAppleEventsUsageDescription</key>
                  <string>Roomler Agent injects input events on behalf of an authorised remote controller.</string>
          </dict>
          </plist>
          PLIST

      - name: Import signing certs
        if: env.APP_P12_BASE64 != ''
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "$APP_P12_BASE64" | base64 -d > /tmp/app.p12
          security import /tmp/app.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security

          echo "$INSTALLER_P12_BASE64" | base64 -d > /tmp/installer.p12
          security import /tmp/installer.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/productbuild -T /usr/bin/security

          security list-keychain -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          rm /tmp/app.p12 /tmp/installer.p12

          # Print identities (harmless — just the CN, not the cert itself)
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Codesign binary
        if: env.APP_P12_BASE64 != ''
        run: |
          set -euo pipefail
          # Sign the bundled FFmpeg dylibs FIRST (inside-out) — the hardened
          # runtime + notarisation reject unsigned nested code. (No-op on the
          # current unsigned builds; correct once Apple secrets are configured.)
          find stage/roomler-agent.app/Contents/Frameworks -type f -name '*.dylib' -print0 \
            | while IFS= read -r -d '' dylib; do
                codesign --sign "Developer ID Application" --options runtime --timestamp "$dylib"
              done
          codesign --sign "Developer ID Application" \
                   --options runtime --timestamp \
                   --entitlements agents/roomler-agent/packaging/macos/entitlements.plist \
                   "stage/roomler-agent.app/Contents/MacOS/roomler-agent"

          codesign --sign "Developer ID Application" \
                   --options runtime --timestamp \
                   "stage/roomler-agent.app"

      - name: Build component + product pkg
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p payload/Applications scripts dist
          cp -R stage/roomler-agent.app payload/Applications/
          cp agents/roomler-agent/packaging/macos/postinstall scripts/postinstall
          chmod 755 scripts/postinstall

          signed=""
          if [[ -n "${INSTALLER_P12_BASE64:-}" ]]; then
            signed="yes"
          fi

          pkgbuild \
            --root payload \
            --scripts scripts \
            --identifier com.roomler.agent \
            --version "$VERSION" \
            --install-location / \
            component.pkg

          if [[ -n "$signed" ]]; then
            productbuild \
              --package component.pkg \
              --sign "Developer ID Installer" \
              "dist/roomler-agent-$VERSION-aarch64-apple-darwin.pkg"
            suffix=""
          else
            productbuild \
              --package component.pkg \
              "dist/roomler-agent-$VERSION-aarch64-apple-darwin-unsigned.pkg"
            suffix="-unsigned"
          fi

          artifact=$(ls dist/*.pkg | head -n1)
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          echo "signed=$signed"     >> "$GITHUB_OUTPUT"

      - name: Notarise
        if: steps.pkg.outputs.signed == 'yes' && env.APPLE_API_KEY_P8_BASE64 != ''
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_P8_BASE64" | base64 -d \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

          xcrun notarytool submit "${{ steps.pkg.outputs.artifact }}" \
            --key "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "${{ steps.pkg.outputs.artifact }}"

      - name: Warn on unsigned / unnotarised build
        if: steps.pkg.outputs.signed != 'yes'
        run: echo "::warning::Apple signing secrets missing — .pkg is unsigned and will be blocked by Gatekeeper on end-user machines."

      - name: SHA256 checksum
        run: shasum -a 256 "${{ steps.pkg.outputs.artifact }}" > "${{ steps.pkg.outputs.artifact }}.sha256"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: |
            ${{ steps.pkg.outputs.artifact }}
            ${{ steps.pkg.outputs.artifact }}.sha256
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 4. Publish — only on tag push (or dispatch with publish_release=true).
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    if: needs.validate-version.outputs.is_release == 'true'
    needs: [validate-version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          # rc.18: include `.exe` so the tray companion EXE makes
          # the GitHub Release alongside the agent MSI/.pkg/.deb. The
          # `windows-msi` artifact bundles agent MSIs + tray EXE +
          # all .sha256 files; flatten preserves them all.
          find dist -type f \( -name '*.msi' -o -name '*.pkg' -o -name '*.deb' -o -name '*.exe' -o -name '*.sha256' \) \
            -exec mv {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.tag }}
          name: roomler-agent ${{ needs.validate-version.outputs.version }}
          # prerelease must stay false so GitHub's /releases/latest API
          # returns this release — the agent's built-in auto-updater
          # polls that endpoint every 6 h. Marking 0.x as prerelease
          # (the previous policy) caused every release to be invisible
          # to /releases/latest, which 404'd and broke self-update for
          # every 0.1.36 agent in the field.
          prerelease: false
          generate_release_notes: true
          files: release/*
