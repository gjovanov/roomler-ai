apiVersion: v1
kind: ConfigMap
metadata:
  name: roomler2-config
data:
  ROOMLER__APP__HOST: "0.0.0.0"
  ROOMLER__APP__PORT: "3000"
  ROOMLER__APP__FRONTEND_URL: "http://roomler2"
  # CORS_ORIGINS deserializes as Vec<String>; the config crate
  # rejects scalar strings ('*' would crash with `invalid type:
  # string "*", expected a sequence`). Leaving it unset uses the
  # default (empty list) — fine because the Playwright test
  # browser and the API are same-origin (`http://roomler2`)
  # in-cluster, so the CORS middleware never trips.

  ROOMLER__DATABASE__URL: "mongodb://mongodb.roomler-ai-e2e.svc.cluster.local:27017"
  ROOMLER__DATABASE__NAME: "roomler_ai_e2e"

  ROOMLER__REDIS__URL: "redis://redis.roomler-ai-e2e.svc.cluster.local:6379"

  ROOMLER__S3__ENDPOINT: "http://minio.roomler-ai-e2e.svc.cluster.local:9000"
  ROOMLER__S3__BUCKET: "roomler2-e2e"
  ROOMLER__S3__REGION: "us-east-1"

  ROOMLER__JWT__ISSUER: "roomler-ai-e2e"

  # Phase 3 will set these when in-cluster coturn / Mailpit /
  # oauth2-mock-server land. Until then, the specs that depend on
  # them are filtered out by scripts/e2e-skip-list.txt.
  ROOMLER__TURN__URL: ""

  ROOMLER__MEDIASOUP__NUM_WORKERS: "1"

  RUST_LOG: "info,roomler_ai=debug"
