# Phase 1 Chunk 1B — bootstrap Secret consumed by the agent-e2e
# StatefulSet. The seed Job (job-agent-e2e-seed.yaml) creates the
# admin user + tenant; THIS file pins the credentials the agent
# StatefulSet reads + the tenant_id it talks to.
#
# `tenant_id` MUST match the ObjectId the seed Job's `/api/auth/me`
# returns. Pin it after the first successful seed-Job run: the Job
# prints `[seed] tenant_id=<hex>` to stdout. Re-bake this Secret if
# you wipe the e2e DB (a fresh tenant gets a fresh id).
#
# Plaintext is fine in e2e — sealed-secrets are encrypted per-
# namespace and don't decrypt when copied across namespaces; the
# same posture as `secret-roomler2.yaml` in this overlay.
apiVersion: v1
kind: Secret
metadata:
  name: agent-e2e-bootstrap
type: Opaque
stringData:
  admin_email: agent-e2e-admin@roomler.local
  admin_password: agent-e2e-bootstrap-pw-2026
  # PLACEHOLDER: replace with the ObjectId emitted by the seed Job's
  # first successful run. Until that's done the StatefulSet Pods
  # will start, hit "tenant not found" against the API, retry
  # forever — visible in `kubectl logs agent-e2e-0`.
  tenant_id: 000000000000000000000000
