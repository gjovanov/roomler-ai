# Net-new Service for the roomler2 deployment in the e2e namespace.
# Prod uses hostNetwork: true and reaches the API via the host's
# port 80; in-cluster e2e drops hostNetwork so we need a ClusterIP
# Service for the Playwright Job (and other in-cluster clients) to
# resolve `http://roomler2[:80]/health` and SPA + API + WS routes.
apiVersion: v1
kind: Service
metadata:
  name: roomler2
  labels:
    app: roomler2
spec:
  type: ClusterIP
  selector:
    app: roomler2
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
