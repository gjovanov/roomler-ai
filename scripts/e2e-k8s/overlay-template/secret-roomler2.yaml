# Plaintext Secret for the e2e roomler2 deployment. None of these
# values are real — sealed-secrets in prod are encrypted per-namespace
# and don't decrypt when copied across, so we hand-write throwaway
# values for the e2e namespace. Specs that exercise OAuth / Stripe /
# email / push are filtered out until Phase 3 lands real fakes.
apiVersion: v1
kind: Secret
metadata:
  name: roomler2-secret
type: Opaque
stringData:
  ROOMLER__JWT__SECRET: "e2e-not-real-jwt-secret-do-not-use-in-prod"

  # MongoDB / Redis URLs with credentials baked in. The config crate
  # (`crates/config/src/settings.rs`) takes a single URL string per
  # service, NOT separate user/pass fields — embed creds in the URL
  # or it'll fail with "Unauthorized: Command createIndexes
  # requires authentication". The corresponding ConfigMap value
  # has no credentials; this Secret value wins because envFrom
  # ordering puts the secret after the configmap.
  ROOMLER__DATABASE__URL: "mongodb://roomler:e2e-mongo-password@mongodb.roomler-ai-e2e.svc.cluster.local:27017"

  ROOMLER__S3__ACCESS_KEY: "minioadmin"
  ROOMLER__S3__SECRET_KEY: "e2e-minio-password"

  # OAuth — placeholder values for Phase 1+2; real fakes in Phase 3.
  ROOMLER__OAUTH__GOOGLE__CLIENT_ID: "e2e-google-client"
  ROOMLER__OAUTH__GOOGLE__CLIENT_SECRET: "e2e-google-secret"
  ROOMLER__OAUTH__GITHUB__CLIENT_ID: "e2e-github-client"
  ROOMLER__OAUTH__GITHUB__CLIENT_SECRET: "e2e-github-secret"
  ROOMLER__OAUTH__FACEBOOK__CLIENT_ID: "e2e-fb-client"
  ROOMLER__OAUTH__FACEBOOK__CLIENT_SECRET: "e2e-fb-secret"
  ROOMLER__OAUTH__LINKEDIN__CLIENT_ID: "e2e-linkedin-client"
  ROOMLER__OAUTH__LINKEDIN__CLIENT_SECRET: "e2e-linkedin-secret"
  ROOMLER__OAUTH__MICROSOFT__CLIENT_ID: "e2e-ms-client"
  ROOMLER__OAUTH__MICROSOFT__CLIENT_SECRET: "e2e-ms-secret"

  # Stripe — Phase 3 may swap with stripe-mock; Phase 1+2 specs skip
  # billing.spec.ts.
  ROOMLER__STRIPE__SECRET_KEY: "sk_test_e2e_not_real"
  ROOMLER__STRIPE__WEBHOOK_SECRET: "whsec_e2e_not_real"
  ROOMLER__STRIPE__PRICE_PRO: "price_e2e_pro"
  ROOMLER__STRIPE__PRICE_BUSINESS: "price_e2e_business"

  ROOMLER__GIPHY__API_KEY: "e2e-giphy-key"

  # Email — EmailService::from_settings (Cycle 4 Chunk 1) picks the
  # SendGrid HTTP backend when `api_key` is non-empty and falls
  # through to the SMTP backend (against Mailpit) when api_key is
  # empty AND `smtp_host` + `smtp_port` are set (configmap sets
  # both). Leave api_key empty so SMTP wins; the configmap's
  # ROOMLER__EMAIL__FROM_EMAIL also takes precedence over this
  # blank since envFrom merges configmap → secret.
  ROOMLER__EMAIL__API_KEY: ""
  ROOMLER__EMAIL__FROM_NAME: "Roomler e2e"

  # VAPID for web push — generated once for e2e; not real keys.
  ROOMLER__PUSH__VAPID_PUBLIC: "BBe2eVapidPublicKeyPlaceholder"
  ROOMLER__PUSH__VAPID_PRIVATE: "e2eVapidPrivateKeyPlaceholder"
  ROOMLER__PUSH__VAPID_SUBJECT: "mailto:noreply@e2e.local"

  # Claude API — empty; Claude features test-skip when unconfigured.
  ROOMLER__CLAUDE__API_KEY: ""

  # TURN — Phase 3 sets to in-cluster coturn.
  ROOMLER__TURN__USERNAME: ""
  ROOMLER__TURN__PASSWORD: ""
