# Standalone deployment for the e2e namespace — no kustomize patches
# against base, so this file owns all the e2e-specific knobs:
#   - drop hostNetwork (Service handles in-cluster routing)
#   - drop nodeSelector pinning to k8s-worker-3 (no PVC binding here)
#   - drop tier=high-performance affinity (any node is fine for e2e)
#   - lower resource requests/limits (e2e doesn't need 2GB / 2 CPU)
#   - regcred imagePullSecret (registry.roomler.ai is private)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roomler2
  labels:
    app: roomler2
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: roomler2
  template:
    metadata:
      labels:
        app: roomler2
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: roomler2
          image: gjovanov/roomler-ai:latest # rewritten by kustomization images:
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: roomler2-config
            - secretRef:
                name: roomler2-secret
          startupProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      terminationGracePeriodSeconds: 15
