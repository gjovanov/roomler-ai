# Vendored copy of webrtc-ice 0.12.0 from crates.io.
# Upstream is verbatim EXCEPT:
#   - src/agent/agent_gather.rs: patched gather_candidates_relay to add
#     a TURNS-over-TLS-over-TCP branch (was a NOT_PLANNED TODO upstream).
#   - src/agent/mod.rs: declares tcp_turn_conn submodule.
#   - src/agent/tcp_turn_conn.rs: NEW — Conn-trait adapter that frames a
#     tokio_rustls::TlsStream<TcpStream> as one STUN/ChannelData frame
#     per recv_from() call, matching what turn::client expects.
#   - this Cargo.toml: tokio-rustls + webpki-roots added; pinned to the
#     same versions our workspace already resolves (rustls 0.23.36) to
#     avoid feature-unification fights.

[package]
edition = "2021"
name = "webrtc-ice"
version = "0.12.0"
authors = ["Rain Liu <yliu@webrtc.rs>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A pure Rust implementation of ICE"
homepage = "https://webrtc.rs"
documentation = "https://docs.rs/webrtc-ice"
readme = "README.md"
license = "MIT OR Apache-2.0"
repository = "https://github.com/webrtc-rs/webrtc/tree/master/ice"

[lib]
name = "webrtc_ice"
path = "src/lib.rs"

[[example]]
name = "ping_pong"
path = "examples/ping_pong.rs"
bench = false

[dependencies.arc-swap]
version = "1"

[dependencies.async-trait]
version = "0.1"

[dependencies.crc]
version = "3"

[dependencies.log]
version = "0.4"

[dependencies.mdns]
version = "0.8.0"
package = "webrtc-mdns"

[dependencies.portable-atomic]
version = "1.6"

[dependencies.rand]
version = "0.8"

[dependencies.serde]
version = "1"
features = ["derive"]

[dependencies.serde_json]
version = "1"

[dependencies.stun]
version = "0.7.0"

[dependencies.thiserror]
version = "1"

[dependencies.tokio]
version = "1.32.0"
features = [
    "fs",
    "io-util",
    "io-std",
    "macros",
    "net",
    "parking_lot",
    "rt",
    "rt-multi-thread",
    "sync",
    "time",
]

[dependencies.turn]
version = "0.9.0"

[dependencies.tokio-rustls]
version = "0.26"
default-features = false
features = ["logging", "tls12", "ring"]

[dependencies.webpki-roots]
version = "0.26"

# Loads the OS-native cert store at runtime. On corporate Windows
# endpoints with TLS inspection enabled, IT pushes a private CA into
# the Windows cert store so browsers + reqwest (Schannel) trust the
# MITM proxy. The Mozilla `webpki-roots` bundle does NOT include
# those private CAs, so TURNS/TCP would fail with `UnknownIssuer`
# against an intercepted endpoint. We extend our RootCertStore with
# native certs first, then add Mozilla's bundle so direct-internet
# hosts also keep working.
[dependencies.rustls-native-certs]
version = "0.8"

[dependencies.url]
version = "2"

[dependencies.util]
version = "0.10.0"
features = [
    "conn",
    "vnet",
    "sync",
]
default-features = false
package = "webrtc-util"

[dependencies.uuid]
version = "1"
features = ["v4"]

[dependencies.waitgroup]
version = "0.1"

[dev-dependencies.chrono]
version = "0.4.28"

[dev-dependencies.clap]
version = "3"

[dev-dependencies.env_logger]
version = "0.11.3"

[dev-dependencies.hyper]
version = "0.14.27"
features = ["full"]

[dev-dependencies.ipnet]
version = "2"

[dev-dependencies.lazy_static]
version = "1"

[dev-dependencies.regex]
version = "1.9.5"

[dev-dependencies.sha1]
version = "0.10"

[dev-dependencies.tokio-test]
version = "0.4"
