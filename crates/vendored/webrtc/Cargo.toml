# Vendored copy of webrtc 0.12.0 from crates.io.
# Upstream is verbatim EXCEPT:
#   - src/api/setting_engine/mod.rs: SettingEngine gains
#     `sctp_max_receive_buffer_size: u32` + matching setter/getter so
#     callers can advertise an SCTP rwnd larger than the upstream
#     1 MB default (INITIAL_RECV_BUF_SIZE in webrtc-sctp-0.11.0). At
#     50-100 ms RTT, 1 MB caps single-stream DC throughput at
#     ~80-167 Mbps; roomler-tunnel needs 8 MB to keep
#     native-to-native DCs link-bound on home-broadband paths.
#   - src/sctp_transport/mod.rs:159: pulls the value out of
#     SettingEngine instead of hardcoding 0 (which falls back to the
#     1 MB upstream default).
#   - src/api/setting_engine/setting_engine_test.rs: round-trip test
#     locking the getter/setter so an upstream Cargo bump can't
#     silently un-do the patch.
#   - this Cargo.toml: header rewritten with patch notes (was the
#     cargo-normalized header for the registry upload).
#
# Default behaviour is unchanged — sctp_max_receive_buffer_size
# defaults to 0, which preserves the upstream 1 MB fallback. Only
# callers that explicitly opt in to a larger value see different
# behaviour. The agent (which doesn't currently touch SettingEngine
# at all) is unaffected.

[package]
edition = "2021"
name = "webrtc"
version = "0.12.0"
authors = ["Rain Liu <yliu@webrtc.rs>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A pure Rust implementation of WebRTC API"
homepage = "https://webrtc.rs"
documentation = "https://docs.rs/webrtc"
readme = "README.md"
license = "MIT OR Apache-2.0"
repository = "https://github.com/webrtc-rs/webrtc"

[lib]
name = "webrtc"
path = "src/lib.rs"

[dependencies.arc-swap]
version = "1"

[dependencies.async-trait]
version = "0.1"

[dependencies.bytes]
version = "1"

[dependencies.cfg-if]
version = "1"

[dependencies.data]
version = "0.10.0"
package = "webrtc-data"

[dependencies.dtls]
version = "0.11.0"
package = "webrtc-dtls"

[dependencies.hex]
version = "0.4"

[dependencies.ice]
version = "0.12.0"
package = "webrtc-ice"

[dependencies.interceptor]
version = "0.13.0"

[dependencies.lazy_static]
version = "1.4"

[dependencies.log]
version = "0.4"

[dependencies.mdns]
version = "0.8.0"
package = "webrtc-mdns"

[dependencies.media]
version = "0.9.0"
package = "webrtc-media"

[dependencies.pem]
version = "3"
optional = true

[dependencies.portable-atomic]
version = "1.6"

[dependencies.rand]
version = "0.8"

[dependencies.rcgen]
version = "0.13"
features = [
    "pem",
    "x509-parser",
]

[dependencies.regex]
version = "1.9.5"

[dependencies.ring]
version = "0.17"

[dependencies.rtcp]
version = "0.12.0"

[dependencies.rtp]
version = "0.12.0"

[dependencies.rustls]
version = "0.23.10"
features = [
    "std",
    "ring",
]
default-features = false

[dependencies.sctp]
version = "0.11.0"
package = "webrtc-sctp"

[dependencies.sdp]
version = "0.7.0"

[dependencies.serde]
version = "1"
features = ["derive"]

[dependencies.serde_json]
version = "1"

[dependencies.sha2]
version = "0.10"

[dependencies.smol_str]
version = "0.2"
features = ["serde"]

[dependencies.srtp]
version = "0.14.0"
package = "webrtc-srtp"

[dependencies.stun]
version = "0.7.0"

[dependencies.thiserror]
version = "1"

[dependencies.time]
version = "0.3"

[dependencies.tokio]
version = "1.32.0"
features = [
    "fs",
    "io-util",
    "io-std",
    "macros",
    "net",
    "parking_lot",
    "rt",
    "rt-multi-thread",
    "sync",
    "time",
]

[dependencies.turn]
version = "0.9.0"

[dependencies.url]
version = "2"

[dependencies.util]
version = "0.10.0"
package = "webrtc-util"

[dependencies.waitgroup]
version = "0.1"

[dev-dependencies.env_logger]
version = "0.11.3"

[dev-dependencies.tokio-test]
version = "0.4"

[features]
openssl = ["srtp/openssl"]
pem = [
    "dep:pem",
    "dtls/pem",
]
vendored-openssl = ["srtp/vendored-openssl"]
